<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EventHub</title>

<style>

/* Body */
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
    scroll-behavior: smooth;
}

/* Navbar */
nav {
    background: #111;
    padding: 15px;
    text-align: center;
}
nav a {
    color: white;
    margin: 10px;
    cursor: pointer;
    text-decoration: none;
}

/* Hero */
.hero {
    background: 
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
    url("https://images.unsplash.com/photo-1492684223066-81342ee5ff30");

    height: 400px;
    background-size: cover;
    background-position: center;
    text-align: center;
    padding-top: 120px;
}

/* Hero Images */
.hero img {
    border-radius: 10px;
    margin: 5px;
    transition: 0.3s;
}
.hero img:hover {
    transform: scale(1.1);
}

/* Sections */
section {
    padding: 40px;
    text-align: center;
}

/* Cards */
.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}
.card {
    width: 250px;
    margin: 15px;
    border-radius: 10px;
    overflow: hidden;
    background: #1a1a1a;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.05);
}
.card img {
    width: 100%;
    height: 150px;
}
.card h3 {
    padding: 10px;
}

/* Form */
form {
    max-width: 400px;
    margin: auto;
}
input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: none;
}

/* Button */
button {
    padding: 10px;
    background: white;
    color: black;
    border: none;
    cursor: pointer;
}
button:hover {
    background: green;
    color: white;
}

/* Price */
#price {
    color: lightgreen;
    font-weight: bold;
}

/* Footer */
footer {
    background: #111;
    padding: 15px;
    text-align: center;
}

</style>
</head>

<body>

<!-- Navbar -->
<nav>
    <a onclick="scrollToSection('home')">Home</a>
    <a onclick="scrollToSection('events')">Events</a>
    <a onclick="scrollToSection('book')">Book</a>
    <a onclick="scrollToSection('contact')">Contact</a>
</nav>

<!-- Hero -->
<div class="hero" id="home">
    <h1>Discover Amazing Events 🎉</h1>
    <p>Book your favorite events now</p>

    <!-- Extra Images -->
    <div>
        <img src="https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2" width="120">
        <img src="https://images.unsplash.com/photo-1523580494863-6f3031224c94" width="120">
        <img src="https://images.unsplash.com/photo-1515168833906-d2a3b82b302a" width="120">
    </div>
</div>

<!-- Events -->
<section id="events">
    <h2>Popular Events</h2>

    <div class="cards">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2">
            <h3>Music Concert</h3>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1523580494863-6f3031224c94">
            <h3>Tech Conference</h3>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1515168833906-d2a3b82b302a">
            <h3>Food Festival</h3>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
            <h3>Startup Meetup</h3>
        </div>

    </div>
</section>

<!-- Booking -->
<section id="book">
    <h2>Book Your Event</h2>

    <form onsubmit="return validateForm()">
        <input type="text" id="name" placeholder="Your Name">
        <input type="email" id="email" placeholder="Email">

        <select id="event" onchange="showPrice()">
            <option value="">Select Event</option>
            <option value="500">Music Concert - ₹500</option>
            <option value="800">Tech Conference - ₹800</option>
            <option value="300">Food Festival - ₹300</option>
            <option value="600">Startup Meetup - ₹600</option>
        </select>

        <p id="price"></p>

        <button type="submit">Book Now</button>
    </form>
</section>

<!-- Contact -->
<section id="contact">
    <h2>Contact Us</h2>
    <p>📞 +91 9876543210</p>
    <p>📧 eventhub@gmail.com</p>
</section>

<!-- Footer -->
<footer>
    © 2026 EventHub
</footer>

<script>

// Scroll
function scrollToSection(id) {
    document.getElementById(id).scrollIntoView();
}

// Price
function showPrice() {
    let price = document.getElementById("event").value;
    let display = document.getElementById("price");

    if(price) {
        display.innerText = "Ticket Price: ₹" + price;
    } else {
        display.innerText = "";
    }
}

// Validation
function validateForm() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let event = document.getElementById("event").value;

    if(name === "" || email === "" || event === "") {
        alert("Please fill all details!");
        return false;
    }

    alert("🎉 Booking Successful!");
    return true;
}

</script>

</body>
</html>
